<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sinh nhật vui vẻ</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            text-align: center;
        }

        h1 {
            margin-top: 120px;
            font-size: 40px;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px white; }
            to { text-shadow: 0 0 25px pink; }
        }

        .btn {
            padding: 15px 35px;
            font-size: 20px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin: 20px;
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.2);
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        #yes {
            background: #ff4d6d;
        }

        #yes:hover {
            transform: scale(1.2);
        }

        #no {
            position: absolute;
            background: gray;
        }

        /* hoa rơi */
        .flower {
            position: fixed;
            top: -10px;
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }

        /* tim bay */
        .heart {
            position: fixed;
            color: pink;
            font-size: 20px;
            animation: floatUp 2s linear forwards;
        }

        @keyframes floatUp {
            to {
                transform: translateY(-100px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <h1>🎂 Sinh nhật vui vẻ nhé?</h1>

    <button id="yes" class="btn" onclick="goYes()">YES 💖</button>
    <button id="no" class="btn">NO 😢</button>

    <script>
        let noBtn = document.getElementById("no");
        let yesBtn = document.getElementById("yes");
        let scale = 1;

        // NO chạy trốn
        noBtn.addEventListener("mouseover", function() {
            let x = Math.random() * (window.innerWidth - 100);
            let y = Math.random() * (window.innerHeight - 50);
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        });

        // Nếu vẫn bấm được NO
        noBtn.addEventListener("click", function() {
            scale += 0.4;
            yesBtn.style.transform = "scale(" + scale + ")";
        });

        function goYes() {
            window.location.href = "yes.html";
        }

        // Hoa rơi
        function createFlower() {
            const f = document.createElement("div");
            f.classList.add("flower");
            f.innerHTML = "🌸";

            f.style.left = Math.random() * window.innerWidth + "px";
            f.style.animationDuration = (Math.random() * 3 + 3) + "s";

            document.body.appendChild(f);
            setTimeout(() => f.remove(), 6000);
        }
        setInterval(createFlower, 300);

        // Tim bay khi di chuột
        document.addEventListener("mousemove", function(e) {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "💖";

            heart.style.left = e.clientX + "px";
            heart.style.top = e.clientY + "px";

            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        });
    </script>

</body>
</html>
