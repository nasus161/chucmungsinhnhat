<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Sinh nhật vui vẻ</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #ffe6f0;
            overflow: hidden;
        }

        h1 {
            margin-top: 100px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 20px;
            border: none;
            cursor: pointer;
            border-radius: 10px;
            margin: 20px;
            transition: 0.3s;
        }

        #yes {
            background: #ff4d6d;
            color: white;
        }

        #no {
            background: gray;
            color: white;
            position: absolute;
        }
    </style>
</head>
<body>

    <h1>🎂 Sinh nhật vui vẻ nhé?</h1>

    <button id="yes" class="btn" onclick="goYes()">YES</button>
    <button id="no" class="btn">NO</button>

    <script>
        let noBtn = document.getElementById("no");
        let yesBtn = document.getElementById("yes");
        let scale = 1;

        // NO chạy trốn khi hover
        noBtn.addEventListener("mouseover", function() {
            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        });

        // Nếu bấm được NO → YES to lên
        noBtn.addEventListener("click", function() {
            scale += 0.5;
            yesBtn.style.transform = "scale(" + scale + ")";
        });

        function goYes() {
            window.location.href = "yes.html";
        }
    </script>

</body>
</html>
